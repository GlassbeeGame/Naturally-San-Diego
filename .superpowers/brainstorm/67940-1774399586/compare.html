<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSD — Compare Layouts</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Lato:wght@400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Lato', sans-serif; background: #111; color: white; min-height: 100vh; }

.top-bar {
  background: #111; padding: 20px 32px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  position: sticky; top: 0; z-index: 10;
}
.top-bar h1 { font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 700; color: white; }
.top-bar p { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.tabs { display: flex; gap: 8px; }
.tab {
  padding: 10px 20px; border-radius: 100px; font-family: 'Poppins', sans-serif;
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  text-decoration: none;
}
.tab-1 { background: rgba(255,255,255,0.08); color: white; border: 1.5px solid rgba(255,255,255,0.1); }
.tab-1:hover, .tab-1.active { background: #006A45; border-color: #006A45; }
.tab-2 { background: rgba(255,255,255,0.08); color: white; border: 1.5px solid rgba(255,255,255,0.1); }
.tab-2:hover, .tab-2.active { background: #00AD5A; border-color: #00AD5A; }
.tab-3 { background: rgba(255,255,255,0.08); color: white; border: 1.5px solid rgba(255,255,255,0.1); }
.tab-3:hover, .tab-3.active { background: #F26447; border-color: #F26447; }

.summary {
  padding: 16px 32px; background: rgba(255,255,255,0.03);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; gap: 40px;
}
.summary-item { font-size: 12px; color: rgba(255,255,255,0.4); }
.summary-item strong { color: rgba(255,255,255,0.8); display: block; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 2px; }

.frame-container { width: 100%; }
iframe {
  width: 100%; height: calc(100vh - 130px);
  border: none; display: block; background: white;
}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>Naturally SD — Layout Comparison</h1>
    <p>Switch between layouts · scroll each one fully · tell me what's landing</p>
  </div>
  <div class="tabs">
    <a class="tab tab-1 active" href="#" onclick="show('modern-direction.html', this)">Option 1 — Split Hero</a>
    <a class="tab tab-2" href="#" onclick="show('layout-v2.html', this)">Option 2 — Photo Hero</a>
    <a class="tab tab-3" href="#" onclick="show('layout-v3.html', this)">Option 3 — Type-Led</a>
  </div>
</div>

<div class="frame-container">
  <iframe id="preview" src="modern-direction.html"></iframe>
</div>

<script>
function show(src, el) {
  event.preventDefault();
  document.getElementById('preview').src = src;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>
